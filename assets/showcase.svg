  <text x="1236" y="52" fill="#6e7681" font-size="15" text-anchor="end">no-reset-mp v1.0.2</text><text x="56" y="118" font-size="19"><tspan fill="#3fb950">gsoc@katana</tspan><tspan fill="#8b949e">:</tspan><tspan fill="#58a6ff">~/fs25/no-reset-mp</tspan><tspan fill="#8b949e">$ </tspan><tspan fill="#e6edf3">no-reset-mp --hardcore</tspan></text><text x="56" y="164" fill="#c9d1d9" font-size="18">&#9656; hook getCanBeReset</text><rect x="640" y="147" width="80" height="24" rx="5" fill="#238636"/><text x="680.0" y="164" fill="#e6edf3" text-anchor="middle" font-size="14" font-weight="700">gated</text><text x="56" y="200" fill="#c9d1d9" font-size="18">&#9656; MP reset-to-shop</text><text x="640" y="200" fill="#e6edf3" font-size="18">denied</text><text x="56" y="236" fill="#c9d1d9" font-size="18">&#9656; singleplayer</text><text x="640" y="236" fill="#39c5cf" font-size="18">untouched</text><text x="56" y="272" fill="#c9d1d9" font-size="18">&#9656; out-of-world rescue</text><text x="640" y="272" fill="#39c5cf" font-size="18">still allowed</text><text x="56" y="322" fill="#8b949e" font-size="15" letter-spacing="1">// no free respawn &#8212; damage means something</text><text x="56" y="384" font-size="32" font-weight="800"><tspan fill="#f85149">free reset</tspan><tspan fill="#6e7681" font-size="23">  &#9472;&#9472;&#9654;  </tspan><tspan fill="#3fb950">consequence</tspan><tspan fill="#8b949e" font-size="18" font-weight="600">  in multiplayer</tspan></text><text x="56" y="436" font-size="19"><tspan fill="#3fb950" font-weight="700">&#10003; hardcore MP  &#183;  SP + genuine stuck-rescue preserved</tspan></text><text x="56" y="466" font-size="16" fill="#6e7681">one gate, surgical &#8212; nothing else in the economy changes.</text><text x="56" y="512" font-size="19"><tspan fill="#3fb950">gsoc@katana</tspan><tspan fill="#8b949e">:</tspan><tspan fill="#58a6ff">~/fs25/no-reset-mp</tspan><tspan fill="#8b949e">$ </tspan></text><rect x="470" y="497" width="11" height="20" fill="#3fb950"/